<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estratificação de Risco - DM2</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h1>Estratificação de Risco em Diabetes Mellitus Tipo 2</h1>
      <p class="subtitle">Identificação do Paciente</p>
      
      <form id="identificacaoForm">
        <div class="form-group">
          <label for="nome">Nome do Paciente (opcional)</label>
          <input type="text" id="nome" placeholder="Digite o nome ou identificador">
        </div>

        <div class="form-group">
          <label for="cpf">CPF (opcional)</label>
          <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX" maxlength="14">
        </div>

        <div class="form-group">
          <label for="data">Data</label>
          <input type="date" id="data" readonly>
        </div>

        <div class="form-group">
          <label for="profissional">Profissional Responsável *</label>
          <input type="text" id="profissional" placeholder="Nome do profissional" required>
        </div>

        <button type="button" class="btn btn-primary" onclick="iniciarAvaliacao()">Iniciar Avaliação</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Setar data de hoje automaticamente
    document.getElementById('data').valueAsDate = new Date();
  </script>
</body>
</html>
