<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estratificação de Risco - DM2</title>
  <style>
/* ========================================
   RESET E ESTILOS GERAIS
   ======================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

/* ========================================
   CONTAINERS
   ======================================== */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px 0;
}

.form-container {
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  padding: 40px;
  max-width: 700px;
  width: 100%;
}

.result-container {
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
  padding: 40px;
  max-width: 900px;
  width: 100%;
}

/* ========================================
   TIPOGRAFIA
   ======================================== */
h1 {
  color: #022e6d;
  font-size: 28px;
  margin-bottom: 10px;
  text-align: center;
}

h2 {
  color: #022e6d;
  font-size: 20px;
  margin-top: 25px;
  margin-bottom: 15px;
  border-bottom: 2px solid #667eea;
  padding-bottom: 8px;
}

h3 {
  color: #333;
  font-size: 16px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  text-align: center;
  font-size: 16px;
  margin-bottom: 30px;
  font-style: italic;
}

p {
  color: #555;
  line-height: 1.6;
}

/* ========================================
   FORMULÁRIOS
   ======================================== */
.section {
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid #eee;
}

.section:last-child {
  border-bottom: none;
}

.form-group {
  margin-bottom: 20px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

label {
  display: block;
  color: #333;
  font-weight: 500;
  margin-bottom: 8px;
}

input[type="text"],
input[type="number"],
input[type="date"],
input[type="email"],
textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 6px;
  font-size: 14px;
  transition: border-color 0.3s ease;
  font-family: inherit;
}

input[type="text"]:focus,
input[type="number"]:focus,
input[type="date"]:focus,
input[type="email"]:focus,
textarea:focus {
  outline: none;
  border-color: #667eea;
  background-color: #f8f9ff;
}

input[type="text"]::placeholder,
input[type="number"]::placeholder,
input[type="date"]::placeholder,
input[type="email"]::placeholder {
  color: #999;
}

input[readonly] {
  background-color: #f5f5f5;
  cursor: not-allowed;
}

/* ========================================
   RADIO BUTTONS E CHECKBOXES
   ======================================== */
.radio-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.radio-group label {
  display: flex;
  align-items: center;
  margin-bottom: 0;
  cursor: pointer;
  font-weight: normal;
}

.radio-group input[type="radio"],
.radio-group input[type="checkbox"] {
  margin-right: 10px;
  cursor: pointer;
  accent-color: #667eea;
  width: 18px;
  height: 18px;
}

/* ========================================
   CLASSIFICAÇÕES
   ======================================== */
.classificacao {
  display: block;
  margin-top: 6px;
  font-size: 14px;
  font-weight: 600;
}

/* ========================================
   BOTÕES
   ======================================== */
.btn {
  padding: 12px 30px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
}

.btn-primary {
  background-color: #667eea;
  color: white;
}

.btn-primary:hover {
  background-color: #5568d3;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-secondary {
  background-color: #6c757d;
  color: white;
}

.btn-secondary:hover {
  background-color: #5a6268;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
}

.btn:active {
  transform: translateY(0);
}

.button-group {
  display: flex;
  gap: 15px;
  margin-top: 35px;
  justify-content: center;
}

/* ========================================
   INFORMAÇÕES POPUP
   ======================================== */
.info-btn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 0 5px;
  transition: transform 0.2s;
}

.info-btn:hover {
  transform: scale(1.2);
}

.info-popup {
  background-color: #f0f4ff;
  border-left: 4px solid #667eea;
  padding: 12px;
  margin-top: 8px;
  border-radius: 4px;
  font-size: 13px;
  color: #555;
}

.info-popup ul {
  margin-left: 20px;
  margin-top: 8px;
}

.info-popup li {
  margin-bottom: 6px;
  color: #666;
}

/* ========================================
   INPUTS INLINE
   ======================================== */
.inline-input {
  width: 150px;
  padding: 8px;
  margin-left: 10px;
}

/* ========================================
   RESULTADO
   ======================================== */
.result-section {
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid #eee;
}

.result-section:last-child {
  border-bottom: none;
}

.risco-box {
  text-align: center;
  margin: 20px 0;
}

.risco-resultado {
  padding: 40px 20px;
  border-radius: 10px;
  color: white;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
}

.risco-resultado h1 {
  color: white;
  font-size: 36px;
  margin: 0;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  background-color: #f8f9fa;
  padding: 20px;
  border-radius: 8px;
}

.info-grid div {
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
}

.info-grid div:last-child {
  border-bottom: none;
}

.info-grid strong {
  color: #022e6d;
  display: block;
  margin-bottom: 5px;
}

.info-grid span {
  color: #666;
}

/* ========================================
   CRITÉRIOS
   ======================================== */
.criterios-list {
  background-color: #f8f9fa;
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #667eea;
}

.criterio-item {
  padding: 12px 0;
  border-bottom: 1px solid #ddd;
}

.criterio-item:last-child {
  border-bottom: none;
}

.criterio-item strong {
  color: #022e6d;
  display: block;
  margin-bottom: 5px;
}

/* ========================================
   PERIODICIDADE
   ======================================== */
.periodicidade-box {
  background-color: #f0f4ff;
  border-left: 4px solid #667eea;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  font-size: 18px;
}

.periodicidade-box p {
  margin: 0;
  font-weight: 600;
}

/* ========================================
   RESPONSIVO
   ======================================== */
@media (max-width: 768px) {
  .form-container,
  .result-container {
    padding: 25px;
  }

  h1 {
    font-size: 24px;
  }

  h2 {
    font-size: 18px;
  }

  .form-row {
    grid-template-columns: 1fr;
  }

  .button-group {
    flex-direction: column;
  }

  .btn {
    width: 100%;
  }

  .info-grid {
    grid-template-columns: 1fr;
  }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  input[type="email"] {
    font-size: 16px; /* Evita zoom em mobile */
  }
}

@media (max-width: 480px) {
  body {
    padding: 10px;
  }

  .form-container,
  .result-container {
    padding: 20px;
  }

  h1 {
    font-size: 20px;
  }

  h2 {
    font-size: 16px;
  }

  .btn {
    padding: 10px 20px;
    font-size: 14px;
  }

  .risco-resultado h1 {
    font-size: 28px;
  }

  .inline-input {
    width: 100%;
    margin-left: 0;
    margin-top: 8px;
  }
}

/* ========================================
   IMPRESSÃO (PDF)
   ======================================== */
@media print {
  body {
    background: white;
    padding: 0;
  }

  .container {
    background: white;
  }

  .form-container,
  .result-container {
    box-shadow: none;
    background: white;
  }

  .button-group {
    display: none;
  }
}

/* ========================================
   RECOMENDAÇÕES
   ======================================== */
.recomendacoes-box {
  background-color: #f8f9fa;
  border-left: 4px solid #667eea;
  padding: 20px 20px 20px 24px;
  border-radius: 8px;
}

.recomendacoes-list {
  margin: 0;
  padding-left: 20px;
  color: #444;
}

.recomendacoes-list li {
  padding: 6px 0;
  border-bottom: 1px solid #e9ecef;
  line-height: 1.5;
}

.recomendacoes-list li:last-child {
  border-bottom: none;
}

/* ========================================
   EXAMES COLAPSÁVEL
   ======================================== */
.collapsible-header {
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0;
  font-family: inherit;
  text-align: left;
}

.collapsible-header:hover h2 {
  color: #667eea;
}

.collapsible-icon {
  font-size: 14px;
  color: #667eea;
  margin-left: 10px;
  flex-shrink: 0;
}

.exames-box {
  background-color: #f0f4ff;
  border-left: 4px solid #667eea;
  padding: 20px 20px 20px 24px;
  border-radius: 8px;
  margin-top: 16px;
}

.exames-list {
  margin: 0;
  padding-left: 20px;
  color: #444;
}

.exames-list li {
  padding: 7px 0;
  border-bottom: 1px solid #dce4ff;
  line-height: 1.5;
}

.exames-list li:last-child {
  border-bottom: none;
}

/* Ícone no resultado de risco */
.risco-icone {
  font-size: 40px;
  margin-bottom: 8px;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h1>Estratificação de Risco em Diabetes Mellitus Tipo 2</h1>
      <p class="subtitle">Identificação do Paciente</p>
      
      <form id="identificacaoForm">
        <div class="form-group">
          <label for="nome">Nome do Paciente (opcional)</label>
          <input type="text" id="nome" placeholder="Digite o nome ou identificador">
        </div>

        <div class="form-group">
          <label for="cpf">CPF (opcional)</label>
          <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX" maxlength="14">
        </div>

        <div class="form-group">
          <label for="data">Data</label>
          <input type="date" id="data" readonly>
        </div>

        <div class="form-group">
          <label for="profissional">Profissional Responsável *</label>
          <input type="text" id="profissional" placeholder="Nome do profissional" required>
        </div>

        <button type="button" class="btn btn-primary" onclick="iniciarAvaliacao()">Iniciar Avaliação</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('data').valueAsDate = new Date();
  </script>
</body>
</html>
